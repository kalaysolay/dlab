services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-damulab}
      POSTGRES_USER: ${POSTGRES_USER:-damulab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-damulab}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-damulab}
      DB_USERNAME: ${POSTGRES_USER:-damulab}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-damulab}
    ports:
      - "8080:8080"

volumes:
  postgres-data:
