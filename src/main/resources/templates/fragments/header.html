<!DOCTYPE html>
<html th:lang="${#locale.language}" lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header class="site-header" th:fragment="header">
    <div class="topbar">
    <span class="public-parent-header-scope" sec:authorize="isAnonymous() or hasRole('PARENT')" hidden></span>
    <a class="brand brand-link" sec:authorize="isAnonymous()" th:href="@{/}">
        <span class="brand-mark">
            <svg class="lucide-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m12 3 1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3Z"></path>
                <path d="m19 15 .8 2.2L22 18l-2.2.8L19 21l-.8-2.2L16 18l2.2-.8L19 15Z"></path>
            </svg>
        </span>
        <span class="brand-copy">
            <strong th:text="#{app.name}">Damulab.kz</strong>
            <small th:text="#{brand.tagline.anonymous}">Платформа для семьи и ученика</small>
        </span>
    </a>
    <a class="brand brand-link" sec:authorize="isAuthenticated()" th:href="@{/dashboard}">
        <span class="brand-mark">
            <svg class="lucide-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m12 3 1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3Z"></path>
                <path d="m19 15 .8 2.2L22 18l-2.2.8L19 21l-.8-2.2L16 18l2.2-.8L19 15Z"></path>
            </svg>
        </span>
        <span class="brand-copy">
            <strong th:text="#{app.name}">Damulab.kz</strong>
            <small sec:authorize="hasRole('STUDENT')" th:text="#{brand.tagline.student}">Мой путь развития</small>
            <small sec:authorize="hasRole('PARENT')" th:text="#{brand.tagline.parent}">Кабинет родителя</small>
            <small sec:authorize="hasRole('ADMIN')" th:text="#{brand.tagline.admin}">Admin Console</small>
        </span>
    </a>
    <nav class="nav" th:aria-label="#{nav.aria.main}" aria-label="Основная навигация">
        <a sec:authorize="isAnonymous()" th:href="@{/#hero}" th:text="#{nav.landing.hero}">Главная</a>
        <a sec:authorize="isAnonymous()" th:href="@{/#flow}" th:text="#{nav.landing.how}">Как работает</a>
        <a sec:authorize="hasRole('PARENT')" th:href="@{/parent}" th:text="#{nav.home}">Главная</a>
        <a sec:authorize="hasRole('PARENT')" th:href="@{/parent/profile}" th:text="#{nav.profile}">Профиль</a>
        <span th:replace="~{fragments/language-switch :: languageSwitch}"></span>
        <a sec:authorize="isAnonymous()" th:href="@{/register}" th:text="#{nav.register}">Регистрация</a>
        <a sec:authorize="isAnonymous()" th:href="@{/login}" th:text="#{nav.login}">Войти</a>
        <form sec:authorize="isAuthenticated()" class="nav-logout" th:action="@{/logout}" method="post">
            <button class="link-button" type="submit" th:text="#{nav.logout}">Выйти</button>
        </form>
    </nav>
    </div>
    <div th:replace="~{fragments/pwa-install-banner :: pwaInstallBanner}"></div>
    <script th:src="@{/js/pwa.js}" defer></script>
</header>
</body>
</html>
