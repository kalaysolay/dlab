<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header class="student-header" th:fragment="studentHeader" th:lang="${#locale.language}">
    <div class="student-header-row">
        <a class="brand brand-link" th:href="@{/student}">
            <span class="brand-mark">
                <svg class="lucide-icon" aria-hidden="true"><use th:href="@{/icons/lucide-sprite.svg#sparkles}"></use></svg>
            </span>
            <span class="brand-copy">
                <strong th:text="#{app.name}">Damulab.kz</strong>
                <small th:text="#{student.brand.subtitle}">Мой путь развития</small>
            </span>
        </a>
        <div class="student-header-actions">
            <span th:replace="~{fragments/language-switch :: languageSwitch}"></span>
            <!-- Аватар-кнопка объединяет Профиль и Выход в один компактный дропдаун.
                 Класс is-profile-active подсвечивает кнопку, когда открыта страница профиля. -->
            <details class="student-user-menu" th:classappend="${activeStudentNav == 'profile'} ? 'is-profile-active'">
                <summary class="student-user-button" th:aria-label="#{student.nav.profile}">
                    <svg class="lucide-icon" aria-hidden="true"><use th:href="@{/icons/lucide-sprite.svg#user}"></use></svg>
                </summary>
                <div class="student-user-dropdown">
                    <a class="student-user-dropdown-item" th:href="@{/student/profile}">
                        <svg class="lucide-icon" aria-hidden="true"><use th:href="@{/icons/lucide-sprite.svg#user}"></use></svg>
                        <span th:text="#{student.nav.profile}">Профиль</span>
                    </a>
                    <form th:action="@{/logout}" method="post">
                        <button class="student-user-dropdown-item" type="submit">
                            <svg class="lucide-icon" aria-hidden="true"><use th:href="@{/icons/lucide-sprite.svg#log-out}"></use></svg>
                            <span th:text="#{nav.logout}">Выход</span>
                        </button>
                    </form>
                </div>
            </details>
        </div>
    </div>
    <div id="toast-stack" class="toast-stack" aria-live="polite" aria-relevant="additions"></div>
    <nav class="student-nav-grid" th:aria-label="#{student.nav.aria}" aria-label="Навигация ученика">
        <a th:href="@{/student}" th:classappend="${activeStudentNav == 'home'} ? 'active'">
            <svg class="lucide-icon" aria-hidden="true"><use th:href="@{/icons/lucide-sprite.svg#home}"></use></svg>
            <span th:text="#{student.nav.home}">Главная</span>
        </a>
        <a th:href="@{/student/tests}" th:classappend="${activeStudentNav == 'tests'} ? 'active'">
            <svg class="lucide-icon" aria-hidden="true"><use th:href="@{/icons/lucide-sprite.svg#clipboard-check}"></use></svg>
            <span th:text="#{student.nav.tests}">Тесты</span>
        </a>
        <a th:href="@{/student/analytics}" th:classappend="${activeStudentNav == 'analytics'} ? 'active'">
            <svg class="lucide-icon" aria-hidden="true"><use th:href="@{/icons/lucide-sprite.svg#line-chart}"></use></svg>
            <span th:text="#{student.nav.analytics}">Аналитика</span>
        </a>
        <a th:href="@{/student/quiz}" th:classappend="${activeStudentNav == 'quiz'} ? 'active'">
            <svg class="lucide-icon" aria-hidden="true"><use th:href="@{/icons/lucide-sprite.svg#brain}"></use></svg>
            <span th:text="#{student.nav.quiz}">Викторина</span>
        </a>
        <button type="button" data-modal-open="achievements-modal">
            <svg class="lucide-icon" aria-hidden="true"><use th:href="@{/icons/lucide-sprite.svg#trophy}"></use></svg>
            <span th:text="#{student.nav.achievements}">Достижения</span>
        </button>
    </nav>
    <div id="achievements-modal" class="modal-layer" hidden>
        <div class="modal-backdrop" data-modal-close="achievements-modal"></div>
        <section class="modal-card achievements-dialog" role="dialog" aria-modal="true" aria-labelledby="achievements-title">
            <div class="modal-head">
                <h2 id="achievements-title" th:text="#{student.modal.achievements.title}">Мои достижения</h2>
                <button class="button" type="button" data-modal-close="achievements-modal" th:text="#{student.modal.close}">Закрыть</button>
            </div>
            <div class="achievement-java-grid" th:if="${!#lists.isEmpty(studentAchievements)}">
                <th:block th:each="ach : ${studentAchievements}">
                    <article th:replace="~{fragments/student-achievement-row :: achievementRow (${ach.code()}, ${ach.earned()}, ${ach.title()}, ${ach.description()}, ${ach.progressCurrent()}, ${ach.requiredValue()})}"></article>
                </th:block>
            </div>
            <div class="achievement-java-grid" th:if="${#lists.isEmpty(studentAchievements)}"
                 th:with="t1=#{student.achievement.placeholder1.title}, b1=#{student.achievement.modal.placeholder1.body},
                          t2=#{student.achievement.placeholder2.title}, b2=#{student.achievement.placeholder2.body},
                          t3=#{student.achievement.placeholder3.title}, b3=#{student.achievement.modal.placeholder3.body}">
                <article th:replace="~{fragments/student-achievement-row :: achievementRow ('achievement-placeholder', false, ${t1}, ${b1}, 0, 1)}"></article>
                <article th:replace="~{fragments/student-achievement-row :: achievementRow ('achievement-placeholder', false, ${t2}, ${b2}, 0, 3)}"></article>
                <article th:replace="~{fragments/student-achievement-row :: achievementRow ('achievement-placeholder', false, ${t3}, ${b3}, 0, 5)}"></article>
            </div>
        </section>
    </div>
    <script>
        (() => {
            const openStudentModal = (modal) => {
                modal.hidden = false;
                requestAnimationFrame(() => {
                    modal.classList.add("is-open");
                });
                document.body.classList.add("modal-open");
            };

            const closeStudentModal = (modal) => {
                modal.classList.remove("is-open");
                const onDone = () => {
                    modal.hidden = true;
                    modal.removeEventListener("transitionend", onDone);
                };
                modal.addEventListener("transitionend", onDone);
                document.body.classList.remove("modal-open");
            };

            document.querySelectorAll("[data-modal-open]").forEach((button) => {
                button.addEventListener("click", () => {
                    const modal = document.getElementById(button.dataset.modalOpen);
                    if (modal) {
                        openStudentModal(modal);
                    }
                });
            });
            document.querySelectorAll("[data-modal-close]").forEach((button) => {
                button.addEventListener("click", () => {
                    const modal = document.getElementById(button.dataset.modalClose);
                    if (modal) {
                        closeStudentModal(modal);
                    }
                });
            });
            document.querySelectorAll(".modal-layer").forEach((modal) => {
                modal.addEventListener("click", (event) => {
                    if (event.target === modal || event.target.classList.contains("modal-backdrop")) {
                        closeStudentModal(modal);
                    }
                });
            });
            document.addEventListener("keydown", (event) => {
                if (event.key === "Escape") {
                    document.querySelectorAll(".modal-layer:not([hidden])").forEach((modal) => {
                        closeStudentModal(modal);
                    });
                    document.querySelectorAll(".student-user-menu[open]").forEach((menu) => {
                        menu.removeAttribute("open");
                    });
                }
            });
        })();

        // Закрываем дропдаун профиля при клике вне него
        document.addEventListener("click", (e) => {
            document.querySelectorAll(".student-user-menu[open]").forEach((menu) => {
                if (!menu.contains(e.target)) {
                    menu.removeAttribute("open");
                }
            });
        });
    </script>
    <div th:replace="~{fragments/pwa-install-banner :: pwaInstallBanner}"></div>
    <script th:src="@{/js/toast.js}"></script>
    <script th:src="@{/js/pwa.js}" defer></script>
</header>
</body>
</html>
