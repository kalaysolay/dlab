<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Профиль родителя</title>
    <th:block th:replace="~{fragments/pwa-head :: pwaHead}"></th:block>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <header th:replace="~{fragments/header :: header}"></header>
    <main class="page profile-layout parent-profile-page">
        <section class="panel">
            <div class="page-head">
                <div>
                    <span class="badge">Семейный кабинет</span>
                    <h1 class="page-title">Профиль родителя</h1>
                    <p class="lede" th:text="${profile.email()}">parent@damulab.kz</p>
                </div>
            </div>
            <div class="alert" th:if="${param.saved}">Профиль сохранен.</div>
            <form class="form" th:action="@{/parent/profile}" th:object="${parentProfileForm}" method="post">
                <div class="field">
                    <label for="fullName">Имя</label>
                    <input id="fullName" th:field="*{fullName}" type="text" autocomplete="name" required>
                    <span class="alert error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
                </div>
                <div class="field">
                    <label for="phone">Телефон</label>
                    <input id="phone" th:field="*{phone}" type="tel" autocomplete="tel">
                    <span class="alert error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
                </div>
                <button class="button primary" type="submit">Сохранить</button>
            </form>
        </section>
        <aside class="panel profile-summary parent-connect-panel">
            <span class="badge">Профиль</span>
            <h2>Семейный кабинет</h2>
            <dl>
                <dt>Email</dt>
                <dd th:text="${profile.email()}">parent@damulab.kz</dd>
                <dt>Телефон</dt>
                <dd th:text="${profile.phone()} ?: 'Не указан'">+77001112233</dd>
            </dl>
        </aside>
    </main>
</div>
</body>
</html>
