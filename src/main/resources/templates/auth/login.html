<!DOCTYPE html>
<html th:lang="${#locale.language}" lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{login.title}">Вход</title>
    <th:block th:replace="~{fragments/pwa-head :: pwaHead}"></th:block>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <header th:replace="~{fragments/header :: header}"></header>
    <main class="page auth-grid auth-page">
        <section class="auth-copy">
            <h1 class="page-title" th:text="#{login.pageTitle}">Войдите в Damulab</h1>
            <p class="lede" th:text="#{login.lede}">Один аккаунт для ученика и родителя. После входа откроется нужный кабинет.</p>
            <div class="warm-card">
                <strong th:text="#{login.cardTitle}">Простой старт</strong>
                <p th:text="#{login.cardBody}">Родитель не проходит тесты, но видит статистику ребенка в своем кабинете.</p>
            </div>
        </section>
        <section class="panel auth-panel">
            <div class="type-tabs compact-tabs">
                <a class="type-tab active" th:href="@{/login}" aria-current="page" th:text="#{login.tabLogin}">Вход</a>
                <a class="type-tab" th:href="@{/register}" th:text="#{login.tabRegister}">Регистрация</a>
            </div>
            <h2 class="section-title" th:text="#{login.title}">Вход</h2>
            <div th:replace="~{fragments/alerts :: alerts}"></div>
            <form class="form wide-form" th:action="@{/login}" method="post">
                <div class="field">
                    <label for="username" th:text="#{login.email}">Email</label>
                    <input id="username" name="username" type="email" autocomplete="username webauthn" required>
                </div>
                <div class="field">
                    <label for="password" th:text="#{login.password}">Пароль</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required>
                </div>
                <button class="button primary" type="submit" th:text="#{login.submit}">Войти</button>
            </form>
            <div class="auth-divider" aria-hidden="true"><span>или</span></div>
            <button id="passkey-login-button" class="button passkey-button" type="button">
                Войти по отпечатку / Passkey
            </button>
            <p id="passkey-login-status" class="muted-line passkey-status" aria-live="polite"></p>
            <!-- Подсказка с demo-паролями отключена перед прод-деплоем
            <p class="muted-line" th:text="#{login.demoHint}">
                Demo: admin@damulab.kz / student@damulab.kz / parent@damulab.kz, пароль password.
            </p>
            -->
        </section>
    </main>
</div>
<script th:src="@{/js/passkeys.js}" defer></script>
</body>
</html>
