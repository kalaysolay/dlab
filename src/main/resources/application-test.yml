spring:
  datasource:
    url: jdbc:h2:mem:damulab;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
damulab:
  ai:
    # Интеграционные тесты без сети: стабильный stub (см. AiContentFactoryIntegrationTest и др.).
    provider: stub
    real-providers-enabled: false
  testing:
    default-question-count: 12
    max-question-count: 20
    min-published-per-subject-grade: 1
  quiz:
    timeout-worker-enabled: false
