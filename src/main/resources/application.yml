spring:
  application:
    name: damulab
  profiles:
    default: local
  thymeleaf:
    cache: false
  mvc:
    hiddenmethod:
      filter:
        enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  # За nginx/Caddy: учитывать X-Forwarded-Proto/Host, чтобы редиректы шли на https://
  forward-headers-strategy: framework
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Мини-лекция и AI: при генерации смотрите консоль — INFO от kz.damulab.ai и QuestionBankService.
# Сырой JSON от модели — только при DEBUG (см. application-local.yml: kz.damulab: DEBUG).
logging:
  level:
    kz.damulab.ai: INFO
    kz.damulab.questions.QuestionBankService: INFO

damulab:
  testing:
    default-question-count: 12
    max-question-count: 20
    min-published-per-subject-grade: 1
  ui:
    server-time-zone: Asia/Almaty
  # Web Push / VAPID: при пустых ключах активируется StubPushProvider (без реальных уведомлений).
  # Генерация ключей: npx web-push generate-vapid-keys
  # VAPID_PUBLIC_KEY — Base64url EC public key; передаётся клиенту для PushManager.subscribe().
  # VAPID_PRIVATE_KEY — Base64url EC private key; используется только на сервере.
  push:
    vapid-public-key: ${VAPID_PUBLIC_KEY:}
    vapid-private-key: ${VAPID_PRIVATE_KEY:}
    subject: ${VAPID_SUBJECT:mailto:admin@damulab.kz}
    # Интервал опроса очереди push-уведомлений (мс)
    worker-delay-ms: 60000
  passkeys:
    rp-id: ${WEBAUTHN_RP_ID:localhost}
    rp-name: ${WEBAUTHN_RP_NAME:Damulab.kz}
    allowed-origins: ${WEBAUTHN_ALLOWED_ORIGINS:http://localhost:8080}
  # Базовые значения; профиль local переопределяет в application-local.yml (openai + real по умолчанию).
  # Если real=false: провайдер openai не вызывается (кроме тестов со своими overrides).
  ai:
    provider: ${AI_PROVIDER:openai}
    # Пустой fallback = не переключаться на DeepSeek при сбое primary (иначе без ключа — deepseek_api_key_missing).
    fallback-provider: ${AI_FALLBACK_PROVIDER:}
    real-providers-enabled: ${AI_REAL_PROVIDERS_ENABLED:true}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      model: ${OPENAI_MODEL:gpt-5.2}
      api-key: ${OPENAI_API_KEY:}
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${DEEPSEEK_MODEL:deepseek-chat}
      api-key: ${DEEPSEEK_API_KEY:}
    mini-lecture:
      # Пусто = та же модель, что damulab.ai.openai.model (OPENAI_MODEL). Отдельно: OPENAI_MINI_LECTURE_MODEL.
      openai-model: ${OPENAI_MINI_LECTURE_MODEL:}
      deepseek-model: ${DEEPSEEK_MINI_LECTURE_MODEL:}
