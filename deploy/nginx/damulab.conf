# Шаблон nginx для Damulab.kz.
# Скопировать на сервер: /etc/nginx/sites-available/damulab.conf
#   sudo ln -s /etc/nginx/sites-available/damulab.conf /etc/nginx/sites-enabled/
# Сертификат Let's Encrypt выпускается certbot (см. docs/DEPLOY_HTTPS.md).
#
# Замените damulab.kz на ваш домен, если отличается.

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name damulab.kz www.damulab.kz;

    # Certbot использует этот location для проверки домена
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS → Spring Boot (порт 8080)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name damulab.kz www.damulab.kz;

    # Пути проставляет certbot после: sudo certbot --nginx -d damulab.kz -d www.damulab.kz
    ssl_certificate     /etc/letsencrypt/live/damulab.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/damulab.kz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # PWA: manifest и service-worker должны отдаваться с тем же origin, что и страницы
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
