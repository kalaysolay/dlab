<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Damulab.kz | Вход и регистрация</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Nunito", "Manrope", "ui-sans-serif", "system-ui", "sans-serif"] },
          colors: { mint: "#dff7ee", lavender: "#efe7ff", skysoft: "#e6f3ff" }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .app-surface {
      background:
        radial-gradient(circle at 15% 20%, rgba(99, 102, 241, 0.14) 0, transparent 38%),
        radial-gradient(circle at 82% 5%, rgba(16, 185, 129, 0.16) 0, transparent 40%),
        radial-gradient(circle at 50% 90%, rgba(245, 158, 11, 0.15) 0, transparent 42%),
        #f8fafc;
    }
    .smooth { transition: all .22s ease; }
      .menu-wrap {
      display: flex;
      align-items: center;
      gap: .45rem;
      border: 1px solid #e2e8f0;
      background: rgba(255, 255, 255, .95);
      padding: .35rem;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, .06);
    }
    .menu-link {
      padding: .55rem .9rem;
      border-radius: 10px;
      font-size: .84rem;
      font-weight: 800;
      color: #475569;
      transition: all .2s ease;
      white-space: nowrap;
    }
    .menu-link:hover { color: #312e81; background: #eef2ff; }
    .menu-link.active { color: #3730a3; background: #e0e7ff; }
    .lang-select-wrap {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      padding: 2px 6px;
    }
    .lang-select {
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .warm-card {
      background: linear-gradient(145deg, #ffffff 0%, rgba(255, 251, 235, .98) 100%);
    }
  </style>
</head>
<body class="app-surface min-h-screen text-slate-800 antialiased">
  <div class="mx-auto max-w-6xl px-4 py-5 sm:px-6 lg:px-8">
    <div class="mx-auto min-h-[calc(100vh-2.5rem)] rounded-[2rem] border border-white/70 bg-white/85 shadow-2xl shadow-indigo-100 backdrop-blur">
      <header class="sticky top-0 z-20 rounded-t-[2rem] border-b border-slate-100 bg-white/90 px-4 py-3 backdrop-blur sm:px-6">
        <div class="flex items-center justify-between gap-3">
          <a href="index.html" class="flex items-center gap-3">
            <span class="inline-flex h-10 w-10 items-center justify-center rounded-2xl bg-indigo-600 text-white"><i data-lucide="sparkles" class="h-5 w-5"></i></span>
            <div><p class="text-sm font-extrabold text-slate-900">Damulab.kz</p><p class="text-xs text-slate-500">Вход и регистрация</p></div>
          </a>
          <nav class="menu-wrap hidden md:flex">
            <a href="index.html" class="menu-link">Главная</a>
            <a href="auth.html" class="menu-link active">Вход</a>
          </nav>
        </div>
      </header>

      <main class="grid items-center gap-8 px-4 py-8 sm:px-6 lg:grid-cols-[1.05fr_.95fr] lg:px-8">
        <section>
          <h1 class="text-3xl font-extrabold text-slate-900 sm:text-4xl">Единый вход в Damulab</h1>
          <p class="mt-3 max-w-lg text-sm leading-relaxed text-slate-600">Одна форма входа и одна форма регистрации. Роль выбирается только при создании аккаунта.</p>
          <div class="warm-card mt-5 rounded-3xl border border-amber-100 p-4 text-sm text-slate-700">
            <p class="font-bold">Простой старт</p>
            <p class="mt-1">Родитель не проходит тесты, но видит всю статистику ребенка в кабинете.</p>
          </div>
        </section>

        <section class="rounded-3xl border border-slate-100 bg-white p-5 shadow-xl shadow-slate-200 sm:p-6">
          <div class="grid grid-cols-2 gap-2 rounded-2xl bg-slate-100 p-1">
            <button id="loginTab" type="button" class="smooth rounded-xl bg-white px-3 py-2 text-sm font-bold text-indigo-700 shadow-sm">Вход</button>
            <button id="registerTab" type="button" class="smooth rounded-xl px-3 py-2 text-sm font-bold text-slate-600">Регистрация</button>
          </div>

          <form id="authForm" class="mt-4 space-y-4">
            <div id="loginFields" class="space-y-4">
              <div>
                <label for="loginEmail" class="mb-1 block text-sm font-semibold text-slate-700">Email</label>
                <input id="loginEmail" type="email" placeholder="you@email.com" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none ring-indigo-500 smooth focus:ring-2">
              </div>
              <div>
                <label for="loginPassword" class="mb-1 block text-sm font-semibold text-slate-700">Пароль</label>
                <input id="loginPassword" type="password" placeholder="Введите пароль" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none ring-indigo-500 smooth focus:ring-2">
              </div>
            </div>

            <div id="registerFields" class="hidden space-y-4">
              <div>
                <label for="registerEmail" class="mb-1 block text-sm font-semibold text-slate-700">Email</label>
                <input id="registerEmail" type="email" placeholder="you@email.com" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none ring-indigo-500 smooth focus:ring-2">
              </div>
              <div class="grid gap-3 sm:grid-cols-2">
                <div>
                  <label for="registerPassword" class="mb-1 block text-sm font-semibold text-slate-700">Пароль</label>
                  <input id="registerPassword" type="password" placeholder="Минимум 8 символов" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none ring-indigo-500 smooth focus:ring-2">
                </div>
                <div>
                  <label for="registerPasswordRepeat" class="mb-1 block text-sm font-semibold text-slate-700">Повторите пароль</label>
                  <input id="registerPasswordRepeat" type="password" placeholder="Повторите пароль" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none ring-indigo-500 smooth focus:ring-2">
                </div>
              </div>
              <div>
                <label for="verificationCode" class="mb-1 block text-sm font-semibold text-slate-700">Код подтверждения из почты</label>
                <input id="verificationCode" type="text" placeholder="Введите код из письма" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none ring-indigo-500 smooth focus:ring-2">
              </div>
              <div>
                <label for="displayName" class="mb-1 block text-sm font-semibold text-slate-700">Имя на сайте</label>
                <input id="displayName" type="text" placeholder="Амир / Алия" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none ring-indigo-500 smooth focus:ring-2">
              </div>
              <div>
                <label for="phoneNumber" class="mb-1 block text-sm font-semibold text-slate-700">Номер телефона</label>
                <input id="phoneNumber" type="tel" placeholder="+7 700 000 00 00" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none ring-indigo-500 smooth focus:ring-2">
              </div>
              <fieldset>
                <legend class="mb-2 block text-sm font-semibold text-slate-700">Роль</legend>
                <div class="grid grid-cols-2 gap-2 rounded-2xl bg-slate-100 p-1">
                  <label class="role-choice flex cursor-pointer items-center gap-2 rounded-xl bg-white px-3 py-2 text-sm font-semibold text-slate-700 shadow-sm">
                    <input type="radio" name="role" value="parent" checked class="h-4 w-4 accent-indigo-600">
                    <span>Я родитель</span>
                  </label>
                  <label class="role-choice flex cursor-pointer items-center gap-2 rounded-xl px-3 py-2 text-sm font-semibold text-slate-700">
                    <input type="radio" name="role" value="student" class="h-4 w-4 accent-indigo-600">
                    <span>Я ученик</span>
                  </label>
                </div>
              </fieldset>
            </div>

            <button id="submitBtn" type="button" class="smooth w-full rounded-2xl bg-indigo-600 px-4 py-3 text-sm font-bold text-white shadow-lg shadow-indigo-200 hover:bg-indigo-700">Войти</button>
          </form>
        </section>
      </main>
    </div>
  </div>

  <script>
    lucide.createIcons();

    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");
    const submitBtn = document.getElementById("submitBtn");
    const loginFields = document.getElementById("loginFields");
    const registerFields = document.getElementById("registerFields");
    const roleLabels = document.querySelectorAll(".role-choice");

    let currentMode = "login";

    function setMode(mode) {
      currentMode = mode;
      const isLogin = currentMode === "login";
      loginTab.className = isLogin
        ? "smooth rounded-xl bg-white px-3 py-2 text-sm font-bold text-indigo-700 shadow-sm"
        : "smooth rounded-xl px-3 py-2 text-sm font-bold text-slate-600";
      registerTab.className = isLogin
        ? "smooth rounded-xl px-3 py-2 text-sm font-bold text-slate-600"
        : "smooth rounded-xl bg-white px-3 py-2 text-sm font-bold text-indigo-700 shadow-sm";
      submitBtn.textContent = isLogin ? "Войти" : "Создать аккаунт";
      loginFields.classList.toggle("hidden", !isLogin);
      registerFields.classList.toggle("hidden", isLogin);
    }

    loginTab.addEventListener("click", () => setMode("login"));
    registerTab.addEventListener("click", () => setMode("register"));

    roleLabels.forEach((label) => {
      label.addEventListener("click", () => {
        roleLabels.forEach((item) => item.className = "role-choice flex cursor-pointer items-center gap-2 rounded-xl px-3 py-2 text-sm font-semibold text-slate-700");
        label.className = "role-choice flex cursor-pointer items-center gap-2 rounded-xl bg-white px-3 py-2 text-sm font-semibold text-slate-700 shadow-sm";
      });
    });

    setMode("login");
  </script>
</body>
</html>
